name: Restore dist packages
description: >
  Downloads the dist-packages artifact (produced by the build job) and
  restores each package's dist/ directory into the checked-out source tree.
  Use this in jobs that need pre-built workspace packages (typecheck, test).

runs:
  using: composite
  steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: .artifacts/packages

    - name: Restore dist directories
      shell: bash
      run: |
        if [ ! -d .artifacts/packages ]; then
          echo "::error::No dist artifacts found at .artifacts/packages — ensure the build job completed successfully."
          exit 1
        fi
        COUNT=0
        for pkg_dir in .artifacts/packages/*/dist; do
          [ -d "$pkg_dir" ] || continue
          pkg=$(basename "$(dirname "$pkg_dir")")
          mkdir -p "packages/${pkg}/dist"
          cp -r "$pkg_dir/." "packages/${pkg}/dist/"
          COUNT=$((COUNT + 1))
        done
        if [ "$COUNT" -eq 0 ]; then
          echo "::error::No package dist/ directories were restored. Check the build artifact contents."
          exit 1
        fi
        echo "Restored dist/ for ${COUNT} package(s): $(ls .artifacts/packages/)"
