name: Self-Heal CI

on:
  # Only run self-heal on the main branch after a push (not on forks or all PRs)
  push:
    branches: [main]

# Never run two self-heal jobs for the same ref simultaneously
concurrency:
  group: self-heal-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  self-heal:
    name: Self-Heal Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install (frozen)
        run: pnpm install --frozen-lockfile

      - name: Build
        id: build
        run: pnpm build
        continue-on-error: true

      - name: Test
        id: test
        run: pnpm test
        continue-on-error: true

      - name: Run self-heal script
        if: steps.build.outcome == 'failure' || steps.test.outcome == 'failure'
        run: |
          if [ ! -f scripts/self-heal.ts ]; then
            echo "::error::scripts/self-heal.ts not found — cannot self-heal."
            exit 1
          fi
          pnpm tsx scripts/self-heal.ts

      - name: Fail if self-heal did not resolve
        if: steps.build.outcome == 'failure' || steps.test.outcome == 'failure'
        run: |
          echo "::error::Build or test failed and self-heal was triggered. Check the self-heal output above."
          exit 1
