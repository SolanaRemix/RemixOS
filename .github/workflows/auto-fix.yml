name: Auto Fix CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install
        run: |
          corepack enable
          pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Run Auto Fix Agent
        if: failure()
        run: node scripts/auto-fix.js
