version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── Core Services ────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REMIXOS_AUTH_REQUIRED=${REMIXOS_AUTH_REQUIRED:-false}
      - REMIXOS_JWT_SECRET=${REMIXOS_JWT_SECRET:-}
      - REMIXOS_TRUST_PROXY=1
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  studio:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.studio
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_GATEWAY_URL=http://gateway:3001
      - NEXT_PUBLIC_WS_URL=ws://gateway:3001
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging: *default-logging

  go-core:
    image: golang:1.21-alpine
    working_dir: /app
    volumes:
      - ../../packages/go-core:/app
    command: go run main.go
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    logging: *default-logging

  # ─── Data Stores ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-remixos}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-remixos_dev}
      - POSTGRES_DB=${POSTGRES_DB:-remixos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remixos}"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # ─── Reverse Proxy ────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_ssl:/etc/nginx/ssl
    depends_on:
      - gateway
      - studio
    restart: unless-stopped
    logging: *default-logging

volumes:
  redis_data:
  postgres_data:
  nginx_ssl:
