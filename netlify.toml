[build]
  base    = "."
  command = "pnpm install --frozen-lockfile && pnpm build"
  publish = "apps/studio/.next"

[build.environment]
  NODE_VERSION              = "20"
  PNPM_VERSION              = "9"
  NEXT_PUBLIC_APP_URL       = "https://remixos.netlify.app"
  NEXT_PUBLIC_GATEWAY_URL   = "https://api.remixos.app"
  NEXT_PUBLIC_WS_URL        = "wss://api.remixos.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options  = "nosniff"
    X-Frame-Options         = "DENY"
    X-XSS-Protection        = "1; mode=block"
    Referrer-Policy         = "strict-origin-when-cross-origin"

[[redirects]]
  from   = "/api/*"
  to     = "https://api.remixos.app/api/:splat"
  status = 200
  force  = true

[context.production]
  command = "pnpm install --frozen-lockfile && pnpm build"

[context.deploy-preview]
  command = "pnpm install --frozen-lockfile && pnpm build"

[context.branch-deploy]
  command = "pnpm install --frozen-lockfile && pnpm build"
